app = "fb-agent"
primary_region = "bom"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/agent.db"
  LOG_LEVEL = "info"

[[mounts]]
  source = "fb_agent_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
